<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Form</title>
</head>
<body>
  <header>
  <h1>User Registration</h1>
  </header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Register</a>
    <a href="#">About</a>
  </nav>
<!-- 폼시작 --> 
  <section>
    <h2>Registration Form</h2>
    <form action="#" method="POST">
      <div>
        <label for="text">이름:</label> 
        <input type="text" id="name" name="text">
      </div>
      <div>
        <label for="email">이메일:</label> 
        <input type="email" id="email" name="email">
      </div>
      <div>
        <label for="password">비밀번호:</label> 
        <input type="password" id="password" name="password">
      </div>
      <div>
        <label for="birth">생년월일:</label> 
        <input type="date" id="birth" name="birth">
      </div>
      <div>
        <label for="age">나이:</label> 
        <input type="number" id="age" name="age" min="18" max="100">
      </div>
      <div>
        <label for="range">만족도:</label> 
        <input type="range" id="range" name="range" min="1" max="10">
        
      </div>
      <div>
        <label>성별:</label>
        <input type="radio" id="male" name="sex" value="male">
        <label for="male">남자</label>
        <input type="radio" id="female" name="sex" value="female">
        <label for="female">여자</label>
        <input type="radio" id="other" name="sex" value="other">
        <label for="other">그외</label>
      </div>
      
      <div>
        <label>관심사:</label>
        <input type="checkbox" id="coding" name="coding" value="coding">
        <label for="coding">coding</label>
        <input type="checkbox" id="gaming" name="gaming" value="gaming">
        <label for="gaming">gaming</label>
        <input type="checkbox" id="reading" name="reading" value="reading">
        <label for="reading">reading</label>
      </div>
      <div>
        <label for="country">나라:</label>
        <select id="country" name="country">
          <option value="South Korea">대한민국</option>
          <option value="USA">미국</option>
          <option value="Japan">일본</option>
          <option value="China">중국</option>
          <option value="UK">영국</option>
        </select>
      </div>
      <div class="buttons">
        <button type="submit">제출</button>
        <button type="reset">초기화</button>
      </div>
    </form>
    <article>
    <p>"Why Register? Registering allows you to access exclusive features..</p>
  </article>
  </section>
  <aside>
    <video src="media/mov_bbb.mp4" controls width="400"></video>
    <p>Registration Tips</p>
    <p>Contact Support</p>
    <svg width="100" height="100">
  <circle cx="50" cy="50" r="40" stroke="green" stroke-width="2" fill="green" />
</svg>

  </aside>
  <footer>
    <p>&copy; 2025 Your Website.<a href="#">연락처링크</a></p>
    
  </footer>
</body>
</html>
